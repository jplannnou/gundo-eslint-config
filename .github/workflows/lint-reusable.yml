# Reusable lint workflow (RATCHET) para todo el fleet GUNDO.
#
# Por qué ratchet: varios repos tienen deuda de lint preexistente (ej. genie-api
# ~172 errores en main). Un gate full nacería rojo y se ignoraría. Esto lintea
# SOLO los archivos tocados por el PR → bloquea errores NUEVOS sin exigir el
# burn-down primero. Cuando un repo termine su burn-down, cambia `ratchet: false`
# para lintear el repo entero.
#
# Uso desde un repo consumidor (.github/workflows/ci.yml):
#   jobs:
#     lint:
#       uses: jplannnou/gundo-eslint-config/.github/workflows/lint-reusable.yml@main
#       secrets: inherit
name: Lint (reusable)

on:
  workflow_call:
    inputs:
      ratchet:
        description: 'Lintear sólo archivos cambiados (true) o el repo entero (false)'
        type: boolean
        default: true
      globs:
        description: 'Extensiones a lintear (regex para grep -E)'
        type: string
        default: '\.(ts|tsx|js|jsx)$'
      node-version:
        type: string
        default: '22'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # pnpm sin versión hardcodeada: action-setup la lee del campo
      # `packageManager` de package.json. El fleet mezcla pnpm 9 y 10.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      # Deps git de la org privada Gundo-Health-and-Food no son clonables con el
      # GITHUB_TOKEN del workflow. No hacen falta para lintear → se stripean
      # (mismo patrón que el Dockerfile / CI de genie-api). Desincroniza el
      # lockfile a propósito, por eso install corre con --no-frozen-lockfile.
      - name: Strip private-org git deps
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));let ch=false;for(const sec of ['dependencies','devDependencies']){const o=p[sec]||{};for(const k of Object.keys(o)){if(/git\+https:\/\/github.com\/Gundo-Health-and-Food\//.test(o[k]||'')){delete o[k];ch=true}}}if(ch){fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');console.log('stripped private-org git deps')}"

      - name: Install
        run: pnpm install --no-frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint (full)
        if: ${{ inputs.ratchet == false }}
        run: pnpm exec eslint .

      - name: Lint (changed files only)
        if: ${{ inputs.ratchet == true && github.event_name == 'pull_request' }}
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only --diff-filter=ACMR "origin/${BASE_REF}...HEAD" \
            | grep -E "${{ inputs.globs }}" || true)
          if [ -z "$CHANGED" ]; then
            echo "No hay archivos lint-ables tocados por el PR."
            exit 0
          fi
          echo "Linteando archivos cambiados:"
          echo "$CHANGED"
          pnpm exec eslint $CHANGED
